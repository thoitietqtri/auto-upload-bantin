name: Auto Upload BanTin

on:
  schedule:
    # 04:00 ICT hằng ngày = 21:00 UTC ngày hôm trước
    - cron: '45 20 * * *'
  workflow_dispatch:

concurrency:
  group: auto-upload-bantin
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      PORTAL_URL: ${{ secrets.PORTAL_URL }}
      UPLOAD_URL: ${{ secrets.UPLOAD_URL }}
      USERNAME:   ${{ secrets.USERNAME }}
      PASSWORD:   ${{ secrets.PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ====== DEBUG NETWORK ======
      - name: Show runner public IP
        run: |
          echo "Public IP of GitHub runner:"
          curl -s ifconfig.me
          echo ""
      
      - name: Test TCP connection to server (port 8888)
        continue-on-error: true
        run: |
          echo "Testing TCP connection..."
          timeout 10 bash -c "</dev/tcp/222.255.11.117/8888" \
            && echo "TCP connection OK" \
            || echo "::warning::Cannot open TCP connection to 222.255.11.117:8888"

      - name: Test HTTP reachability
        continue-on-error: true
        run: |
          url="${PORTAL_URL:-http://222.255.11.117:8888/Login.aspx}"
          echo "Testing HTTP access to $url"
          curl -v --max-time 20 "$url" || echo "::warning::HTTP request failed"

      # ====== CHECK SECRETS ======
      - name: Check required secrets
        shell: bash
        run: |
          check() {
            if [ -z "$1" ]; then
              echo "::error::$2 is missing. Add it in Settings → Secrets and variables → Actions."
              exit 1
            fi
          }
          check "${USERNAME}" "USERNAME"
          check "${PASSWORD}" "PASSWORD"

      # ====== CHECK PDF ======
      - name: Ensure PDFs exist under bantin/
        run: |
          if ls bantin/*.pdf 1> /dev/null 2>&1; then
            echo "Found PDF(s) in bantin/."
          else
            echo "::error::No PDFs found in bantin/."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install --upgrade pip
          pip install playwright python-dotenv requests
          python -m playwright install --with-deps chromium

      # ====== RUN SCRIPT ======
      - name: Run uploader
        run: |
          python tools/playwright_uploader.py

      - name: Upload artifact (screenshots/logs)
        uses: actions/upload-artifact@v4
        with:
          name: upload-proof
          path: |
            after_upload.png
            tools/*.log
          if-no-files-found: ignore
